<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Trending Keywords Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: white;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
}
.status {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #10b981;
    padding: 10px 15px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 1000;
}
.status.error { background: #ef4444; }
.container {
    max-width: 1200px;
    margin: auto;
}
.card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid #334155;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}
.chart-container {
    position: relative;
    height: 400px;  /* ✅ FIXED: Explicit height */
    width: 100%;
}
h1 { text-align: center; margin-bottom: 30px; }
h2 { margin-top: 0; color: #f8fafc; }
.keyword {
    display: inline-block;
    background: #334155;
    padding: 8px 12px;
    margin: 5px;
    border-radius: 20px;
    font-size: 14px;
    transition: transform 0.2s, background 0.2s;
    cursor: pointer;
}
.keyword:hover {
    transform: scale(1.05);
    background: #3b82f6;
}
.loading {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
    font-style: italic;
}
small { color: #94a3b8; display: block; margin-top: 10px; }
</style>
</head>

<body>
<h1>🔥 Live Trending Keywords Dashboard</h1>
<div class="status" id="status"></div>

<div class="container">
    <div class="card">
        <h2>🏆 Top 20 Keywords</h2>
        <div id="keywords"><div class="loading">Loading...</div></div>
        <small>Last updated: <span id="lastUpdate">--</span></small>
    </div>

    <div class="card">
        <h2>📈 Live Trending Chart</h2>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
const API_URL = "https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=T2CSW&client_ip=request_ip";
let chart;

async function fetchData() {
    try {
        showStatus("Fetching live data...", "#f59e0b");
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const res = await fetch(API_URL, {
            cache: 'no-cache',
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        
        const data = await res.json();
        if (!data.results?.length) throw new Error("No rooms data");
        
        processKeywords(data.results);
        showStatus(`Updated: ${new Date().toLocaleTimeString()} (${data.results.length} rooms)`, "#10b981");
        document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString();
            
    } catch (error) {
        console.error("API Error:", error);
        showStatus(`Error: ${error.message}`, "#ef4444");
        document.getElementById("keywords").innerHTML = 
            '<div class="loading" style="color: #ef4444;">Failed to load data</div>';
    }
}

function processKeywords(rooms) {
    const stopWords = {'the':1,'and':1,'for':1,'are':1,'but':1,'not':1,'you':1,'all':1,'can':1};
    let keywordCount = {};

    rooms.slice(0, 500).forEach(room => {  // Limit processing for performance
        // TAGS (high weight)
        (room.tags || []).forEach(tag => {
            const cleanTag = tag.toLowerCase().trim();
            if (cleanTag.length >= 3) {
                keywordCount[cleanTag] = (keywordCount[cleanTag] || 0) + (room.num_users || 1);
            }
        });

        // SUBJECT (low weight)
        const subject = (room.room_subject || "").toLowerCase().replace(/[^\w\s]/g, ' ');
        const words = subject.match(/\b[a-z]{4,}\b/g) || [];
        
        words.slice(0, 10).forEach(word => {  // Limit words per room
            if (!stopWords[word] && word.length >= 4) {
                keywordCount[word] = (keywordCount[word] || 0) + 1;
            }
        });
    });

    const sorted = Object.entries(keywordCount)
        .filter(([key]) => key.length >= 3)
        .sort(([,a], [,b]) => b - a)
        .slice(0, 20);

    updateUI(sorted);
}

function updateUI(data) {
    const container = document.getElementById("keywords");
    container.innerHTML = data.length ? "" : '<div class="loading">No trending keywords</div>';

    data.forEach(([key, val], i) => {
        const el = document.createElement("div");
        el.className = "keyword";
        el.innerHTML = `<strong>#${i+1}</strong> ${key} <span style="color:#10b981">(${val.toLocaleString()})</span>`;
        el.title = `Score: ${val}`;
        container.appendChild(el);
    });

    updateChart(data);
}

function updateChart(data) {
    const canvas = document.getElementById("chart");
    
    // ✅ FIXED: Destroy existing chart properly
    if (chart) {
        chart.destroy();
        chart = null;
    }

    const labels = data.map(([key]) => key);
    const values = data.map(([,val]) => val);

    chart = new Chart(canvas, {
        type: 'bar',
        data: {
            labels,
            datasets: [{
                label: 'Popularity Score',
                data: values,
                backgroundColor: (ctx) => {
                    const gradient = ctx.chart.ctx.createLinearGradient(0, 0, 0, 400);
                    gradient.addColorStop(0, 'rgba(59, 130, 246, 0.9)');
                    gradient.addColorStop(1, 'rgba(37, 99, 235, 0.7)');
                    return gradient;
                },
                borderColor: '#3b82f6',
                borderWidth: 2,
                borderRadius: 8,
                borderSkipped: false,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: {
                duration: 1000,
                easing: 'easeOutQuart'
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    titleColor: 'white',
                    bodyColor: 'white',
                    cornerRadius: 8
                }
            },
            scales: {
                x: {
                    ticks: { 
                        color: '#cbd5e1',
                        maxRotation: 45,
                        minRotation: 45,
                        font: { size: 11 }
                    },
                    grid: { color: 'transparent' }
                },
                y: {
                    beginAtZero: true,
                    ticks: { 
                        color: '#94a3b8',
                        callback: (value) => value.toLocaleString()
                    },
                    grid: { 
                        color: 'rgba(83, 104, 158, 0.2)',
                        drawBorder: false
                    }
                }
            }
        }
    });
}

function showStatus(message, color) {
    const status = document.getElementById("status");
    status.textContent = message;
    status.style.background = color;
    status.style.opacity = '1';
    setTimeout(() => status.style.opacity = '0', 4000);
}

// 🚀 Initialize
fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
